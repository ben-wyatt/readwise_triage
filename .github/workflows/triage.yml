name: Readwise Triage
on:
  schedule:
    - cron: '0 10 * * *' # daily at 5am EST (10am UTC)
  workflow_dispatch: {}

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm start
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          DRY_RUN: 'false'
